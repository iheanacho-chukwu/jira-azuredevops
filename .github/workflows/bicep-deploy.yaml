name: Deploy Bicep template

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  auto-vm-start:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set debug environment variable
        run: echo "AZURE_ARM_DEPLOY_LOG_LEVEL=debug" >> $GITHUB_ENV

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_BVT }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Deploy Bicep template
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create --resource-group demo --template-file Bicep/main.bicep --parameters Bicep/main.bicepparam